---
outdir: 'SC8SCAN_deepsets_8bit_16const'
data_hyperparams:

  root: "/home/akseli/l1-jet-id/data/"

  nconst: 16

  pdg_order: [22, -11, 11, -13, 13, 130, -211, 211]

  norm: "standard"

  kfolds: 5

  seed: 42

  datasets:
    bkg:
      - "/home/akseli/l1-jet-id/data/Phase2Spring24_QCD_Pt15To3000_PU200/1.root"
      - "/home/akseli/l1-jet-id/data/Phase2Spring24_QCD_Pt15To3000_PU200/2.root"
      - "/home/akseli/l1-jet-id/data/Phase2Spring24_QCD_Pt15To3000_PU200/3.root"
      - "/home/akseli/l1-jet-id/data/Phase2Spring24_QCD_Pt15To3000_PU200/4.root"
      - "/home/akseli/l1-jet-id/data/Phase2Spring24_QCD_Pt15To3000_PU200/5.root"
      - "/home/akseli/l1-jet-id/data/Phase2Spring24_QCD_Pt15To3000_PU200/6.root"
      - "/home/akseli/l1-jet-id/data/Phase2Spring24_QCD_Pt15To3000_PU200/7.root"
      - "/home/akseli/l1-jet-id/data/Phase2Spring24_QCD_Pt15To3000_PU200/8.root"
      - "/home/akseli/l1-jet-id/data/Phase2Spring24_QCD_Pt15To3000_PU200/9.root"
      - "/home/akseli/l1-jet-id/data/Phase2Spring24_QCD_Pt15To3000_PU200/10.root"
      - "/home/akseli/l1-jet-id/data/Phase2Spring24_QCD_Pt15To3000_PU200/11.root"
      - "/home/akseli/l1-jet-id/data/Phase2Spring24_QCD_Pt15To3000_PU200/12.root"
      - "/home/akseli/l1-jet-id/data/Phase2Spring24_QCD_Pt15To3000_PU200/13.root"
      - "/home/akseli/l1-jet-id/data/Phase2Spring24_QCD_Pt15To3000_PU200/14.root"
    sig:
      - "/home/akseli/l1-jet-id/data/Phase2Spring24_QCD_Pt15To3000_PU200/Phase2Spring24_QCD_Pt15To3000_PU200.root"

  test_size: 0.2
  random_state: 42

model_type: "qinvariant"
model_hyperparams:
  phi_layers: [64]
  rho_layers: [32, 4]
  activ: "relu"
  aggreg: "mean"
  output_dim: 2
  nbits: 8

compilation_hyperparams:
  optimizer: "adam"
  optimizer_hps:
    learning_rate: 0.0029
  optimizer_callbacks:
    early_stopping:
      monitor: "val_accuracy"
      patience: 20
    lr_decay:
      monitor: "val_accuracy"
      factor: 0.8
      patience: 10
      min_lr: 0.0001

  loss: "softmax_with_crossentropy"
  metrics: ["accuracy"]
  early_stopping: 20

training_hyperparams:
  batch_size: 256
  epochs: 1000
  shuffle: True
  verbose: 2
